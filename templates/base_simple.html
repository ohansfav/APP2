<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}APP - Athlete Performance Predictor{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_simple.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-section">
                <i class="fas fa-crown"></i>
                <h3>APP</h3>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/" class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="/athletes" class="nav-link {% if request.endpoint == 'main.athletes_list' %}active{% endif %}">
                    <i class="fas fa-users"></i>
                    <span>Athletes</span>
                </a>
                <a href="/analytics" class="nav-link {% if request.endpoint == 'main.analytics' %}active{% endif %}">
                    <i class="fas fa-chart-bar"></i>
                    <span>Analytics</span>
                </a>
                <a href="/events" class="nav-link {% if request.endpoint == 'main.events_list' %}active{% endif %}">
                    <i class="fas fa-calendar"></i>
                    <span>Events</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <a href="/logout" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Header -->
            <header class="top-header">
                <h1>
                    <span class="page-title">{% block page_title %}Dashboard{% endblock %}</span>
                </h1>
                <div class="header-info">
                    <span class="user-info">
                        <i class="fas fa-user-circle"></i>
                        {{ session.user_name or 'Admin' }}
                    </span>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="content-area">
                {% if error %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                {% endif %}
                
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
